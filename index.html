  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

eight:300; font-style:normal; src:url(\"687c84d1-8cbf-4bb3-bb3b-41fc69e93f5a\") format('woff'); font-display:swap; }\n@font-face { font-family:'Stratos'; font-weight:300; font-style:italic; src:url(\"aca0cba1-0a06-4c00-b08b-056d2231dc19\") format('woff'); font-display:swap; }\n@font-face { font-family:'Stratos'; font-weight:400; font-style:normal; src:url(\"fa81f7ee-1b7e-42f4-9064-9beac8245e4a\") format('woff'); font-display:swap; }\n@font-face { font-family:'Stratos'; font-weight:400; font-style:italic; src:url(\"1cd9c944-5eb2-4c03-8375-c783093e8c20\") format('woff'); font-display:swap; }\n@font-face { font-family:'Stratos'; font-weight:500; font-style:normal; src:url(\"bc742e72-ddfa-4036-9a07-8d3b3caff8d2\") format('woff'); font-display:swap; }\n@font-face { font-family:'Stratos'; font-weight:600; font-style:normal; src:url(\"81020937-826b-48af-a2ae-761baa953bfd\") format('woff'); font-display:swap; }\n@font-face { font-family:'Stratos'; font-weight:700; font-style:normal; src:url(\"b8996999-f881-4204-90a0-375b89c83987\") format('woff'); font-display:swap; }\n\n:root {\n  --bg:          #0B0B0D;\n  --bg-deep:     #050507;\n  --bg-elev:     #14141A;\n  --bg-card:     #111116;\n  --fg:          #F5F5F2;\n  --fg-muted:    #B4B4B0;\n  --fg-faint:    #7A7A7A;\n  --fg-dim:      #4A4A48;\n  --accent:      #C8102E;\n  --accent-hot:  #FF1E3C;\n  --accent-soft: rgba(200,16,46,0.18);\n  --accent-glow: rgba(200,16,46,0.45);\n  --gold:        #C9A227;\n  --gold-soft:   rgba(201,162,39,0.22);\n  --border:      rgba(245,245,242,0.08);\n  --border-strong: rgba(245,245,242,0.18);\n  --divider:     rgba(245,245,242,0.06);\n  --display:     'Stratos','Inter',system-ui,sans-serif;\n  --body:        'Inter',system-ui,sans-serif;\n}\n\n* { margin:0; padding:0; box-sizing:border-box; }\nhtml, body { background:var(--bg); color:var(--fg); font-family:var(--body); -webkit-font-smoothing:antialiased; }\nhtml { scroll-behavior:smooth; }\nbody { overflow-x:hidden; cursor:none; }\n::selection { background:var(--accent); color:var(--fg); }\n\na { color:inherit; text-decoration:none; }\nbutton { font:inherit; color:inherit; background:none; border:none; cursor:none; }\nimg, svg { display:block; }\n\n/* ── Background field (film grain + scanlines + vignette) ───────────────── */\n.grain {\n  position:fixed; inset:0; pointer-events:none; z-index:60;\n  mix-blend-mode:overlay; opacity:0.06;\n  background-image:url(\"data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPScyNDAnIGhlaWdodD0nMjQwJz48ZmlsdGVyIGlkPSduJz48ZmVUdXJidWxlbmNlIHR5cGU9J2ZyYWN0YWxOb2lzZScgYmFzZUZyZXF1ZW5jeT0nMC45JyBudW1PY3RhdmVzPSczJyBzdGl0Y2hUaWxlcz0nc3RpdGNoJy8+PC9maWx0ZXI+PHJlY3Qgd2lkdGg9JzI0MCcgaGVpZ2h0PScyNDAnIGZpbHRlcj0ndXJsKCUyM24pJyBvcGFjaXR5PScwLjg1Jy8+PC9zdmc+\");\n}\n.scanlines {\n  position:fixed; inset:0; pointer-events:none; z-index:59;\n  background:repeating-linear-gradient(to bottom, transparent 0, transparent 2px, rgba(255,255,255,0.012) 2px, rgba(255,255,255,0.012) 3px);\n}\n.vignette {\n  position:fixed; inset:0; pointer-events:none; z-index:58;\n  background:radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.55) 100%);\n}\n\n/* ── Custom cursor ──────────────────────────────────────────────────────── */\n.cursor-dot, .cursor-ring {\n  position:fixed; top:0; left:0; pointer-events:none; z-index:200;\n  transform:translate(-50%,-50%);\n  will-change:transform;\n}\n.cursor-dot {\n  width:6px; height:6px; background:var(--accent); border-radius:50%;\n  box-shadow:0 0 10px var(--accent-glow);\n}\n.cursor-ring {\n  width:34px; height:34px; border:1px solid rgba(245,245,242,0.35); border-radius:50%;\n  transition:width 0.25s, height 0.25s, border-color 0.25s, background 0.25s;\n}\n.cursor-ring.hover {\n  width:64px; height:64px; border-color:var(--accent); background:rgba(200,16,46,0.06);\n}\n\n/* ── Chrome (top bar) ───────────────────────────────────────────────────── */\n.topbar {\n  position:fixed; top:0; left:0; right:0; height:64px; z-index:50;\n  display:flex; align-items:center; justify-content:space-between;\n  padding:0 clamp(20px, 4vw, 48px);\n  backdrop-filter:blur(20px) saturate(1.1);\n  background:rgba(11,11,13,0.72);\n  border-bottom:1px solid var(--border);\n  font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:var(--fg-muted); font-weight:500;\n}\n.topbar .brand { display:flex; align-items:center; gap:12px; color:var(--fg); }\n.brand-mark {\n  width:22px; height:22px; border:1px solid var(--accent); display:flex; align-items:center; justify-content:center;\n  font-family:var(--display); font-style:italic; font-weight:300; font-size:14px; color:var(--accent); letter-spacing:0;\n}\n.topbar nav { display:flex; gap:28px; }\n.topbar nav a { position:relative; transition:color 0.25s; padding:6px 0; }\n.topbar nav a:hover { color:var(--fg); }\n.topbar nav a.active { color:var(--accent); }\n.topbar nav a.active::after {\n  content:''; position:absolute; left:0; right:0; bottom:-22px; height:2px; background:var(--accent);\n}\n.on-air { display:flex; align-items:center; gap:10px; color:var(--fg); }\n.on-air-dot {\n  width:8px; height:8px; border-radius:50%; background:var(--accent);\n  animation:pulse 1.6s ease-in-out infinite;\n}\n@keyframes pulse {\n  0%, 100% { opacity:1; transform:scale(1); box-shadow:0 0 0 0 var(--accent-glow); }\n  50%      { opacity:0.55; transform:scale(0.78); box-shadow:0 0 0 8px rgba(200,16,46,0); }\n}\n\n/* ── Scroll progress beam ──────────────────────────────────────────────── */\n.scrollbeam {\n  position:fixed; right:0; top:64px; bottom:0; width:1px; z-index:48;\n  background:linear-gradient(to bottom, transparent, rgba(245,245,242,0.06) 10%, rgba(245,245,242,0.06) 90%, transparent);\n}\n.scrollbeam-fill {\n  position:absolute; top:0; left:-0.5px; width:2px; background:var(--accent); height:0;\n  box-shadow:0 0 12px var(--accent-glow);\n  transition:height 0.05s linear;\n}\n.scrollbeam-meta {\n  position:fixed; right:18px; bottom:24 \n.pcard.l1 { z-index:4; transform:translate3d(-30px, 16px, -120px) rotateY(8deg) rotateX(2deg); opacity:0.75; }\n.pcard.l2 { z-index:3; transform:translate3d(-60px, 32px, -240px) rotateY(14deg) rotateX(2deg); opacity:0.45; }\n.pcard.r1 { z-index:4; transform:translate3d( 30px, 16px, -120px) rotateY(-8deg) rotateX(2deg); opacity:0.75; }\n.pcard.r2 { z-index:3; transform:translate3d( 60px, 32px, -240px) rotateY(-14deg) rotateX(2deg); opacity:0.45; }\n.pcard-overline { font-size:10px; letter-spacing:0.32em; text-transform:uppercase; color:var(--accent); font-weight:500; }\n.pcard-text {\n  font-family:var(--display); font-weight:300; font-style:italic;\n  font-size:clamp(24px, 2.4vw, 32px); line-height:1.35; color:var(--fg);\n  text-wrap:pretty;\n}\n.pcard-num { font-family:var(--display); font-weight:300; font-style:italic; color:var(--gold); font-size:14px; letter-spacing:0.1em; }\n.pcard-foot { display:flex; justify-content:space-between; align-items:center; }\n.pcard-glyph {\n  position:absolute; top:32px; right:32px; width:36px; height:36px;\n  border:1px solid var(--gold-soft); border-radius:50%; display:flex; align-items:center; justify-content:center;\n  color:var(--gold); font-family:var(--display); font-style:italic; font-size:14px;\n}\n\n.pcontrols {\n  position:absolute; bottom:-90px; left:50%; transform:translateX(-50%);\n  display:flex; gap:14px; align-items:center;\n}\n.pbtn {\n  width:56px; height:56px; border:1px solid var(--border-strong);\n  display:flex; align-items:center; justify-content:center;\n  color:var(--fg); transition:all 0.3s; font-size:18px;\n}\n.pbtn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-soft); }\n.pbtn.main { width:auto; padding:0 28px; gap:10px; background:var(--accent); border-color:var(--accent); color:#fff; font-size:11px; letter-spacing:0.3em; text-transform:uppercase; font-weight:500; height:56px; }\n.pbtn.main:hover { background:var(--accent-hot); }\n\n.prompt-mini-row {\n  margin-top:160px; display:grid; grid-template-columns:repeat(3,1fr); gap:16px;\n}\n@media (max-width:900px) { .prompt-mini-row { grid-template-columns:1fr 1fr; } }\n@media (max-width:600px) { .prompt-mini-row { grid-template-columns:1fr; } }\n.mini {\n  background:var(--bg-card); border:1px solid var(--border); padding:24px 26px;\n  font-family:var(--display); font-style:italic; font-weight:300; font-size:16px; line-height:1.45;\n  color:var(--fg-muted); transition:all 0.3s; min-height:140px; display:flex; align-items:center;\n  position:relative;\n}\n.mini:hover { color:var(--fg); border-color:rgba(200,16,46,0.35); background:var(--bg-elev); }\n.mini .idx {\n  position:absolute; top:16px; right:18px; font-family:var(--display); font-style:italic; font-weight:300;\n  font-size:11px; color:var(--gold); letter-spacing:0.1em;\n}\n\n/* ── Checklist ─────────────────────────────────────────────────────────── */\n.prep-grid {\n  display:grid; grid-template-columns:1fr 1fr; gap:14px;\n}\n@media (max-width:900px) { .prep-grid { grid-template-columns:1fr; } }\n.prep {\n  background:var(--bg-card); border:1px solid var(--border); padding:22px 24px;\n  display:flex; gap:18px; align-items:flex-start; transition:all 0.3s; position:relative; overflow:hidden;\n}\n.prep::before {\n  content:''; position:absolute; left:0; top:0; bottom:0; width:0; background:var(--accent); transition:width 0.4s;\n}\n.prep:hover { border-color:rgba(200,16,46,0.35); background:var(--bg-elev); }\n.prep:hover::before { width:2px; }\n.prep.done { opacity:0.4; }\n.prep.done::before { width:3px; background:var(--gold); opacity:1; }\n.prep .box {\n  width:22px; height:22px; flex-shrink:0; margin-top:2px;\n  border:1px solid var(--border-strong); display:flex; align-items:center; justify-content:center;\n  transition:all 0.3s;\n}\n.prep.done .box { background:var(--accent); border-color:var(--accent); }\n.prep .box svg { width:12px; height:12px; opacity:0; transition:opacity 0.3s; }\n.prep.done .box svg { opacity:1; }\n.prep .lbl {\n  font-family:var(--display); font-weight:500; font-size:15px; color:var(--fg); line-height:1.3; margin-bottom:6px;\n}\n.prep .sub {\n  font-size:12px; color:var(--fg-muted); line-height:1.55;\n}\n.prep .num {\n  font-family:var(--display); font-style:italic; font-weight:200; font-size:11px;\n  color:var(--gold); letter-spacing:0.1em; position:absolute; top:8px; right:14px;\n}\n\n/* ── Commit footer ─────────────────────────────────────────────────────── */\n.commit {\n  position:relative; padding:140px 0 80px; overflow:hidden;\n  border-top:1px solid var(--border);\n  background:linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);\n}\n.commit::before {\n  content:''; position:absolute; left:50%; top:0; bottom:0; width:1px; transform:translateX(-50%);\n  background:linear-gradient(to bottom, var(--accent), transparent 70%);\n  opacity:0.5;\n}\n.commit-inner { text-align:center; max-width:780px; margin:0 auto; padding:0 24px; position:relative; z-index:1; }\n.commit-glow {\n  position:absolute; left:50%; top:0; transform:translate(-50%, -50%);\n  width:600px; height:600px; pointer-events:none;\n  background:radial-gradient(circle, rgba(200,16,46,0.15), transparent 60%);\n}\n.commit h2 {\n  font-family:var(--display); font-weight:200; font-style:italic;\n  font-size:clamp(36px, 5vw, 72px); line-height:1.0; letter-spacing:-0.025em;\n}\n.commit h2 em { font-style:italic; color:var(--accent); }\n.commit h2 .gold { color:var(--gold); }\n.commit-sub { margin-top:32px; font-size:14px; line-height:1.7; color:var(--fg-muted); max-width:540px; margin-left:auto; margin-right:auto; }\n.commit-fields { margin-top:48px; display:flex; gap:12px; max-width:560px; margin-left:auto; margin-right:auto; }\n.commit input {\n  flex:1; background:transparent; border:1px solid var(--border-strong); padding:18px 20px;\n  color:var(--fg); font-family:var(--body); font-size:14px; outline:none; transition:border-color 0.3s;\n}\n.commit input:focus { border-color:var(--accent); }\n.commit input::placeholder { color:var(--fg-faint); }\n.commit-btn {\n  padding:0 32px; background:var(--accent); color:#fff;\n  font-size:11px; letter-spacing:0.3em; text-transform:uppercase; font-weight:500; transition:background 0.3s;\n}\n.commit-btn:hover { background:var(--accent-hot); }\n.commit-meta {\n  margin-top:80px; padding-top:32px; border-top:1px solid var(--border);\n  display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:24px;\n  font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:var(--fg-faint); font-weight:500;\n}\n.commit-meta .gold { color:var(--gold); font-family:var(--display); font-style:italic; font-weight:300; letter-spacing:0.08em; text-transform:none; font-size:14px; }\n\n/* ── Reveal on scroll ──────────────────────────────────────────────────── */\n.reveal { opacity:0; transform:translateY(28px); transition:opacity 0.9s var(--ease, cubic-bezier(0.2,0.6,0.2,1)), transform 0.9s var(--ease, cubic-bezier(0.2,0.6,0.2,1)); }\n.reveal.in { opacity:1; transform:translateY(0); }\n.reveal.d1 { transition-delay:0.08s; }\n.reveal.d2 { transition-delay:0.16s; }\n.reveal.d3 { transition-delay:0.24s; }\n.reveal.d4 { transition-delay:0.32s; }\n\n/* ── Mobile niceties ───────────────────────────────────────────────────── */\n@media (max-width:760px) {\n  body { cursor:auto; }\n  .cursor-dot, .cursor-ring { display:none; }\n  button { cursor:pointer; }\n  a { cursor:pointer; }\n  .marginalia, .scrollbeam-meta { display:none; }\n  .topbar nav { display:none; }\n  .section-head { flex-direction:column; align-items:flex-start; }\n  .commit-fields { flex-direction:column; }\n  .commit-btn { padding:18px; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- ── overlays ────────────────────────────────────────────────────────── -->\n<div class=\"grain\" aria-hidden=\"true\"><\u002Fdiv>\n<div class=\"scanlines\" aria-hidden=\"true\"><\u002Fdiv>\n<div class=\"vignette\" aria-hidden=\"true\"><\u002Fdiv>\n<div class=\"cursor-ring\" id=\"cur-ring\"><\u002Fdiv>\n<div class=\"cursor-dot\" id=\"cur-dot\"><\u002Fdiv>\n\n<!-- ── chrome ──────────────────────────────────────────────────────────── -->\n<header class=\"topbar\">\n  <div class=\"brand\">\n    <div class=\"brand-mark\">R<\u002Fdiv>\n    <span>Resonance · ƒ 432 · TC 00:00:00<\u002Fspan>\n  <\u002Fdiv>\n  <nav id=\"topnav\">\n    <a href=\"#concept\" class=\"active\">Concept<\u002Fa>\n    <a href=\"#day1\">Day · 01<\u002Fa>\n    <a href=\"#day2\">Day · 02<\u002Fa>\n    <a href=\"#prompts\">Sparks<\u002Fa>\n    <a href=\"#prep\">Prep<\u002Fa>\n  <\u002Fnav>\n  <div class=\"on-air\">\n    <span class=\"on-air-dot\"><\u002Fspan>\n    <span>Живий сигнал<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<div class=\"ticks\">\n  <div class=\"tick tl\"><\u002Fdiv><div class=\"tick tr\"><\u002Fdiv>\n  <div class=\"tick bl\"><\u002Fdiv><div class=\"tick br\"><\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"marginalia\">Vox redit ad corpus · Spiritus · Resonantia · Axis<\u002Fdiv>\n\n<div class=\"scrollbeam\"><div class=\"scrollbeam-fill\" id=\"beam\"><\u002Fdiv><\u002Fdiv>\n<div class=\"scrollbeam-meta\">прокрути · резонуй · слухай<\u002Fdiv>\n\n<!-- ── HERO ────────────────────────────────────────────────────────────── -->\n<section class=\"hero\" id=\"hero\" data-screen-label=\"01 Hero\">\n  <canvas id=\"hero-canvas\"><\u002Fcanvas>\n  <div class=\"hero-bgtext\">resonance<\u002Fdiv>\n  <div class=\"hero-content\">\n    <div class=\"hero-eyebrow\"><span class=\"dot\"><\u002Fspan> Творчий ретрит-план · вип. I<\u002Fdiv>\n    <h1 class=\"hero-title\">RESO<em>NANCE<\u002Fem><span class=\"tag\">MMXXVI<\u002Fspan><\u002Fh1>\n    <p class=\"hero-sub\">Два дні. Три насінини. Одна частота, яку знаходиш лише коли шум стихає. Робочий метод для музичних команд, відточений до ритуалу.<\u002Fp>\n    <div class=\"hero-stats\">\n      <div class=\"stat\"><div class=\"n\">02<\u002Fdiv><div class=\"l\">Дні<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"n\"><em>13<\u002Fem><\u002Fdiv><div class=\"l\">Сесії<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"n\">03<\u002Fdiv><div class=\"l\">Насінини<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"n\">48<em>h<\u002Fem><\u002Fdiv><div class=\"l\">Тільки сигнал<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"hero-cues\">\n    <span>plate · 001 / 005<\u002Fspan>\n    <div class=\"scroll-cue\">\n      <span>Begin<\u002Fspan>\n      <span class=\"line\"><\u002Fspan>\n    <\u002Fdiv>\n    <span>ƒ 2.0 · 24 fps · b&amp;r<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── MANIFESTO ───────────────────────────────────────────────────────── -->\n<section class=\"manifesto\" id=\"manifesto\" data-screen-label=\"02 Manifesto\">\n  <div class=\"axis-vert\"><\u002Fdiv>\n  <div class=\"manifesto-inner\">\n    <p class=\"manifesto-quote reveal\">\n      Більшість творчих блоків — це не <em>брак ідей<\u002Fem>. Це <span class=\"gold\">надто багато шуму<\u002Fspan> — старі припущення, старі звички, старі звуки. Ретрит знімає їх.\n    <\u002Fp>\n    <div class=\"manifesto-attr reveal d1 overline gold\">— Принцип дизайну Resonance<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── CONCEPT / PHILOSOPHY ────────────────────────────────────────────── -->\n<section class=\"section\" id=\"concept\" data-screen-label=\"03 Concept\">\n  <div class=\"wrap\">\n    <div class=\"section-head reveal\">\n      <div class=\"head-left\">\n        <div class=\"overline\">§ 01 · The Philosophy<\u002Fdiv>\n        <h2 class=\"h2\" style=\"margin-top:18px;\">перед проривами<br>come <em>breakdowns<\u002Fem>. <span class=\"gold\">Заплановане.<\u002Fspan><\u002Fh2>\n        <p class=\"lede\">Чотири робочі принципи. Вони звучать суворо — і це так. Стриманість — технологія, що робить ретрит дієвим.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"section-num\">§ I<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"principles\">\n      <div class=\"tile reveal\" data-tilt=\"\">\n        <div class=\"tile-sym\">∽<\u002Fdiv>\n        <div class=\"tile-num\">01<span class=\"small\">·<\u002Fspan><\u002Fdiv>\n        <div>\n          <div class=\"tile-title\">Сигнал понад шум.<\u002Fdiv>\n          <div class=\"tile-body\">Жодних соцмереж. Жодного чату по проєкту. Сорок вісім годин чистого творчого сигналу — вхід всередину, сирий вихід назовні. Нічого між.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tile reveal d1\" data-tilt=\"\">\n        <div class=\"tile-sym\">▲<\u002Fdiv>\n        <div class=\"tile-num\">02<span class=\"small\">·<\u002Fspan><\u002Fdiv>\n        <div>\n          <div class=\"tile-title\">Обмеження <em style=\"color:var(--accent);font-style:italic;\">як каталізатор<\u002Fem>.<\u002Fdiv>\n          <div class=\"tile-body\">Обмеження породжує винахід. Кожна сесія має правило, що змушує вас відчувати дискомфорт. Комфорт — ворог.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tile reveal d2\" data-tilt=\"\">\n        <div class=\"tile-sym\">○<\u002Fdiv>\n        <div class=\"tile-num\">03<span class=\"small\">·<\u002Fspan><\u002Fdiv>\n        <div>\n          <div class=\"tile-title\">Творіть <em style=\"color:var(--accent);font-style:italic;\">раніше<\u002Fem>, ніж думаєте.<\u002Fdiv>\n          <div class=\"tile-body\">Жодних сесій планування. Жодного роудмепінгу. Спочатку творіть, потім аналізуйте. Результат — священний, аналіз — це податок.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tile reveal d3\" data-tilt=\"\">\n        <div class=\"tile-sym\">|<\u002Fdiv>\n        <div class=\"tile-num\">04<span class=\"small\">·<\u002Fspan><\u002Fdiv>\n        <div>\n          <div class=\"tile-title\">Тиша — це <em style=\"color:var(--accent);font-style:italic;\">робота<\u002Fem>.<\u002Fdiv>\n          <div class=\"tile-body\">Паузи між сесіями захищені. Не заповнюйте кожен проміжок. Тиша — це простір, куди входять ідеї.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"concept-row\" style=\"margin-top:64px;\">\n      <div class=\"concept-card reveal\">\n        <div class=\"overline gold\">Ідеальне місце<\u002Fdiv>\n        <h4>Місце, що не<br>відчувається як <em>робота.<\u002Fem><\u002Fh4>\n        <p>Дача. Орендована студія в незнайомому місті. Лісовий будинок зі струмом. Простір має відчуватися трохи чужим — достатньо знайомим, щоб функціонувати, достатньо дивним, щоб похитнути звичне мислення. Якщо можна вийти надвір босоніж опівночі — ви знайшли його.<\u002Fp>\n        <svg class=\"concept-glyph\" viewBox=\"0 0 100 100\"><circle cx=\"50\" cy=\"50\" r=\"48\" fill=\"none\" stroke=\"#C9A227\" stroke-width=\"0.5\"><\u002Fcircle><circle cx=\"50\" cy=\"50\" r=\"32\" fill=\"none\" stroke=\"#C9A227\" stroke-width=\"0.5\"><\u002Fcircle><path d=\"M50 2 L50 98 M2 50 L98 50\" stroke=\"#C9A227\" stroke-width=\"0.3\"><\u002Fpath><\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"concept-card reveal d1\">\n        <div class=\"overline\">Що ви забираєте<\u002Fdiv>\n        <h4>Три сирі насінини.<br><em>Не<\u002Fem> завершений альбом.<\u002Fh4>\n        <p>Мета — не готовий продукт. Три справжні творчі насінини: звуковий напрям, ліричний концепт і один несподіваний елемент, що дивує навіть вас. Задокументовано. Записано. Чорновик — ок. Вони стають якорями для наступного циклу.<\u002Fp>\n        <svg class=\"concept-glyph\" viewBox=\"0 0 100 100\"><circle cx=\"35\" cy=\"50\" r=\"28\" fill=\"none\" stroke=\"#C8102E\" stroke-width=\"0.6\"><\u002Fcircle><circle cx=\"65\" cy=\"50\" r=\"28\" fill=\"none\" stroke=\"#C8102E\" stroke-width=\"0.6\"><\u002Fcircle><\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── DAYS ────────────────────────────────────────────────────────────── -->\n<section class=\"section\" id=\"day1\" data-screen-label=\"04 Days\">\n  <div class=\"wrap\">\n    <div class=\"section-head reveal\">\n      <div class=\"head-left\">\n        <div class=\"overline\">§ 02 · The Schedule<\u002Fdiv>\n        <h2 class=\"h2\" style=\"margin-top:18px;\">Two movements.<br>Тіло рухається <em>first<\u002Fem>.<\u002Fh2>\n        <p class=\"lede\">Перший день деконструює старий сигнал. Другий будує з того, що залишилось. Форма — та сама, яку має резонанс: хвиля, що відбивається від себе.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"section-num\">§ II<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"daytabs reveal\">\n      <button class=\"daytab active\" data-day=\"d1\"><span class=\"num\">i.<\u002Fspan> День · 01 · Деконструкція<\u002Fbutton>\n      <button class=\"daytab\" data-day=\"d2\"><span class=\"num\">ii.<\u002Fspan> День · 02 · Конструкція<\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- DAY 1 -->\n    <div class=\"daypanel active\" id=\"d1\">\n      <div class=\"daygrid\">\n        <div class=\"day-meta\">\n          <div class=\"day-label\">01.<\u002Fdiv>\n          <div class=\"day-sub\">День перший · п'ятниця<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <h3 class=\"day-headline\">Зламайте старий сигнал.<br>Слухайте, що <em>underneath.<\u002Fem><\u002Fh3>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"timeline\">\n        <div class=\"tline-item reveal\">\n          <div class=\"tline-time\">09:00<\u002Fdiv><div class=\"tline-dot\"><\u002Fdiv>\n          <div class=\"tline-card\">\n            <div class=\"tline-head\">\n              <div class=\"tline-title\">Церемонія референсів<\u002Fdiv>\n              <div class=\"tline-tag accent\">Група · 90 хв<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"tline-body\">Кожен приносить <strong>дві пісні<\u002Fstrong> — одну про те, де ви зараз творчо, одну про те, куди хочете. Без пояснень. Просто зіграйте. Група слухає в тиші й записує одне слово після кожної. Then you talk.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tline-item reveal\">\n          <div class=\"tline-time\">10:30<\u002Fdiv><div class=\"tline-dot\"><\u002Fdiv>\n          <div class=\"tline-card\">\n            <div class=\"tline-head\">\n              <div class=\"tline-title\">Розтин<\u002Fdiv>\n              <div class=\"tline-tag accent\">Група · 60 хв<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"tline-body\">Разом переглядаємо результати останніх 3 місяців. Для кожної роботи: <strong>що спрацювало, що було форсованим, що хотілося б зробити інакше.<\u002Fstrong> Будьте безжальні. Єдине правило — не захищати минулі рішення. Просто спостерігайте.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tline-item reveal\">\n          <div class=\"tline-time\">12:00<\u002Fdiv><div class=\"tline-dot\" style=\"background:var(--gold);box-shadow:0 0 0 4px rgba(201,162,39,0.18),0 0 20px rgba(201,162,39,0.4);\"><\u002Fdiv>\n          <div class=\"tline-card\">\n            <div class=\"tline-head\">\n              <div class=\"tline-title\">Тиша та Їжа<\u002Fdiv>\n              <div class=\"tline-tag gold\">Пауза · 90 хв<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"tline-body\">Їжте разом. Без музики. Без телефонів. Говоріть про що завгодно, крім проєкту. Нехай ранок осяде в тіло.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tline-item reveal\">\n          <div class=\"tline-time\">13:30<\u002Fdiv><div class=\"tline-dot\"><\u002Fdiv>\n          <div class=\"tline-card\">\n            <div class=\"tline-head\">\n              <div class=\"tline-title\">Спринти з обмеженнями<\u002Fdiv>\n              <div class=\"tline-tag accent\">Solo &amp; Share · 90 min<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"tline-body\">Три раунди × двадцять хвилин. Кожен раунд має правило.<\u002Fdiv>\n            <div class=\"rules\">\n              <div class=\"r\"><b>i.<\u002Fb> Зіграйте з трьома акордами, які ніколи не поєднували.<\u002Fdiv>\n              <div class=\"r\"><b>ii.<\u002Fb> Опишіть звук свого проєкту лише запахами і текстурами.<\u002Fdiv>\n              <div class=\"r\"><b>iii.<\u002Fb> Зробіть 60-секундне демо лише голосом. Без інструментів.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tline-item reveal\">\n          <div class=\"tline-time\">15:30<\u002Fdiv><div class=\"tline-dot\"><\u002Fdiv>\n          <div class=\"tline-card\">\n            <div class=\"tline-head\">\n              <div class=\"tline-title\">Перехресне зараження<\u002Fdiv>\n              <div class=\"tline-tag accent\">Пари · 90 хв<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"tline-body\">Swap roles. Producers write lyrics. Vocalists suggest arrangements. Guitarists describe percussion. Work on each other's unfinished ideas for 40 minutes, then present what you did.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tline-item reveal\">\n          <div class=\"tline-time\">19:00<\u002Fdiv><div class=\"tline-dot\" style=\"background:var(--gold);box-shadow:0 0 0 4px rgba(201,162,39,0.18),0 0 20px rgba(201,162,39,0.4);\"><\u002Fdiv>\n          <div class=\"tline-card\">\n            <div class=\"tline-head\">\n              <div class=\"tline-title\">Вільний джем — без тиску результату<\u002Fdiv>\n              <div class=\"tline-tag gold\">Вечір · Вільний<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"tline-body\">Грайте. Експериментуйте. Цього вечора нічого не записується, якщо хтось не наполягає. Єдине правило: якщо щось викликає несподіване відчуття, <strong>скажіть це вголос одразу.<\u002Fstrong><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- DAY 2 -->\n    <div class=\"daypanel\" id=\"d2\">\n      <div class=\"daygrid\">\n        <div class=\"day-meta\">\n          <div class=\"day-label\">02.<\u002Fdiv>\n          <div class=\"day-sub\">День другий · субота<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <h3 class=\"day-headline\">Будуйте з того, що з'явилося.<br>Commit to <em>the strange.<\u002Fem><\u002Fh3>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"timeline\">\n        <div class=\"tline-item reveal\">\n          <div class=\"tline-time\">09:00<\u002Fdiv><div class=\"tline-dot\"><\u002Fdiv>\n          <div class=\"tline-card\">\n            <div class=\"tline-head\">\n              <div class=\"tline-title\">Ранкові сторінки × Аудіо<\u002Fdiv>\n              <div class=\"tline-tag accent\">Соло + Група · 60 хв<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"tline-body\">Двадцять хвилин соло. Кожен записує голосове повідомлення — потік свідомості про те, що спливло. Без редагування, без перезапису. Потім усі слухають записи одне одного. Відзначайте образи, слова, звуки, що повторюються.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tline-item reveal\">\n          <div class=\"tline-time\">10:00<\u002Fdiv><div class=\"tline-dot\"><\u002Fdiv>\n          <div class=\"tline-card\">\n            <div class=\"tline-head\">\n              <div class=\"tline-title\">Три насінини<\u002Fdiv>\n              <div class=\"tline-tag accent\">Групове рішення · 60 хв<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"tline-body\">Група погоджує три творчі насінини для роботи сьогодні.<\u002Fdiv>\n            <div class=\"rules\">\n              <div class=\"r\"><b>Насінина I.<\u002Fb> Звуковий напрям — конкретна текстура, темповий діапазон або звуковий світ.<\u002Fdiv>\n              <div class=\"r\"><b>Насінина II.<\u002Fb> Ліричне ядро — фраза, образ або напруга.<\u002Fdiv>\n              <div class=\"r\"><b>Насінина III.<\u002Fb> Несподіваний елемент — щось, що не «пасує», але відчувається правдивим.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tline-item reveal\">\n          <div class=\"tline-time\">11:00<\u002Fdiv><div class=\"tline-dot\"><\u002Fdiv>\n          <div class=\"tline-card\">\n            <div class=\"tline-head\">\n              <div class=\"tline-title\">Блок швидкого створення<\u002Fdiv>\n              <div class=\"tline-tag accent\">Вся команда · 3 год<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"tline-body\">Три години. Всі працюють. Кожна насінина отримує хоча б один чорновий ескіз. Записуйте все — голосові нотатки теж рахуються. Стандарт — <strong>цікаво та справжньо<\u002Fstrong>, не завершено. Ніхто не критикує під час цього блоку. Застрягли? Переключіться на іншу насінину.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tline-item reveal\">\n          <div class=\"tline-time\">14:30<\u002Fdiv><div class=\"tline-dot\" style=\"background:var(--gold);box-shadow:0 0 0 4px rgba(201,162,39,0.18),0 0 20px rgba(201,162,39,0.4);\"><\u002Fdiv>\n          <div class=\"tline-card\">\n            <div class=\"tline-head\">\n              <div class=\"tline-title\">Обід та прогулянка<\u002Fdiv>\n              <div class=\"tline-tag gold\">Пауза · 90 хв<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"tline-body\">Обов'язковий час надворі. Без порядку денного. Якщо прийде ідея — запишіть одне ключове слово в телефон, без повних нотаток. Нехай підсвідомість завершить обробку.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tline-item reveal\">\n          <div class=\"tline-time\">16:00<\u002Fdiv><div class=\"tline-dot\"><\u002Fdiv>\n          <div class=\"tline-card\">\n            <div class=\"tline-head\">\n              <div class=\"tline-title\">Прослуховування та Намір<\u002Fdiv>\n              <div class=\"tline-tag accent\">Група · 90 хв<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"tline-body\">Презентуйте кожен ескіз, чернетку, ідею дня. Без пояснень перед програванням — просто зіграйте. Після кожного: <strong>одне слово-реакція від кожного<\u002Fstrong>. Потім вирішіть разом — чи має ця насінина майбутнє? Якщо так — призначте того, хто її понесе. Якщо ні — відзначте й відпустіть.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tline-item reveal\">\n          <div class=\"tline-time\">17:30<\u002Fdiv><div class=\"tline-dot\"><\u002Fdiv>\n          <div class=\"tline-card\">\n            <div class=\"tline-head\">\n              <div class=\"tline-title\">Ритуал Наміру<\u002Fdiv>\n              <div class=\"tline-tag accent\">Завершення · 30 хв<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"tline-body\">Кожен називає одну конкретну річ, яку зобов'язується створити протягом наступних 30 днів на основі цього ретриту. Не розмиті наміри — <strong>конкретний результат.<\u002Fstrong> Напишіть це. Сфотографуйте. Надішліть групі.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tline-item reveal\">\n          <div class=\"tline-time\">18:00<\u002Fdiv><div class=\"tline-dot\" style=\"background:var(--gold);box-shadow:0 0 0 4px rgba(201,162,39,0.18),0 0 20px rgba(201,162,39,0.4);\"><\u002Fdiv>\n          <div class=\"tline-card\">\n            <div class=\"tline-head\">\n              <div class=\"tline-title\">Святкування · щось, що ви любите<\u002Fdiv>\n              <div class=\"tline-tag gold\">Вечір · Неструктурований<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"tline-body\">Їжа, напій, плейлист пісень, що надихнули вас. Без розмов про роботу. Нехай ретрит «приземлиться».<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── PROMPTS ─────────────────────────────────────────────────────────── -->\n<section class=\"section\" id=\"prompts\" data-screen-label=\"05 Sparks\">\n  <div class=\"wrap\">\n    <div class=\"section-head reveal\">\n      <div class=\"head-left\">\n        <div class=\"overline\">§ 03 · Spark Engine<\u002Fdiv>\n        <h2 class=\"h2\" style=\"margin-top:18px;\">Коли в кімнаті <em>стає тихо<\u002Fem>.<br>Витягніть картку.<\u002Fh2>\n        <p class=\"lede\">П'ятнадцять підказок, що розморожують застиглу кімнату. Кожна вказує на те, що ви вдаєте, що не існує. Торкніться, витягніть, поверніться.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"section-num\">§ III<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"prompt-stage reveal\" id=\"prompt-stage\">\n      <div class=\"prompt-bg\"><\u002Fdiv>\n      <div class=\"pcard l2\" data-pos=\"-2\"><div class=\"pcard-glyph\">∿<\u002Fdiv><\u002Fdiv>\n      <div class=\"pcard l1\" data-pos=\"-1\"><div class=\"pcard-glyph\">∿<\u002Fdiv><\u002Fdiv>\n      <div class=\"pcard front\" data-pos=\"0\" id=\"pcard-front\">\n        <div>\n          <div class=\"pcard-overline\">Картка · I / XV<\u002Fdiv>\n          <div class=\"pcard-glyph\">∿<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pcard-text\" id=\"pcard-text\">Який звук ви асоціюєте з моментом, коли щось от-от зламається?<\u002Fdiv>\n        <div class=\"pcard-foot\">\n          <div class=\"pcard-num\">N° I<\u002Fdiv>\n          <div class=\"pcard-num\">Resonance · Колода іскор<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pcard r1\" data-pos=\"1\"><div class=\"pcard-glyph\">∿<\u002Fdiv><\u002Fdiv>\n      <div class=\"pcard r2\" data-pos=\"2\"><div class=\"pcard-glyph\">∿<\u002Fdiv><\u002Fdiv>\n\n      <div class=\"pcontrols\">\n        <button class=\"pbtn\" id=\"pbtn-prev\">←<\u002Fbutton>\n        <button class=\"pbtn main\" id=\"pbtn-shuffle\">↻ Shuffle<\u002Fbutton>\n        <button class=\"pbtn\" id=\"pbtn-next\">→<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"prompt-mini-row\" id=\"mini-row\" style=\"margin-top:200px;\">\n      <!-- populated by JS -->\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── PREP ────────────────────────────────────────────────────────────── -->\n<section class=\"section\" id=\"prep\" data-screen-label=\"06 Prep\">\n  <div class=\"wrap\">\n    <div class=\"section-head reveal\">\n      <div class=\"head-left\">\n        <div class=\"overline\">§ 04 · Pre-Offsite<\u002Fdiv>\n        <h2 class=\"h2\" style=\"margin-top:18px;\">Ретрит починається<br><em>before<\u002Fem> the offsite.<\u002Fh2>\n        <p class=\"lede\">Вісім речей на тиждень до початку. Ця підготовка і робить два дні ефективними. Відзначайте виконані.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"section-num\">§ IV<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"prep-grid reveal\">\n      <div class=\"prep\" data-check=\"\">\n        <div class=\"box\"><svg viewBox=\"0 0 12 12\"><path d=\"M2 6 L5 9 L10 3\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div>\n          <div class=\"lbl\">Надішліть запит «дві пісні»<\u002Fdiv>\n          <div class=\"sub\">Одну — де ви зараз. Одну — куди хочете. Надіслати за три дні до початку.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"num\">i.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"prep\" data-check=\"\">\n        <div class=\"box\"><svg viewBox=\"0 0 12 12\"><path d=\"M2 6 L5 9 L10 3\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div>\n          <div class=\"lbl\">Забронюйте місце, що не є вашою студією<\u002Fdiv>\n          <div class=\"sub\">Airbnb з кімнатами для роботи. Репетиційний простір поза містом. Щось трохи «не те».<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"num\">ii.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"prep\" data-check=\"\">\n        <div class=\"box\"><svg viewBox=\"0 0 12 12\"><path d=\"M2 6 L5 9 L10 3\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div>\n          <div class=\"lbl\">Телефони в режим польоту — домовитись як група<\u002Fdiv>\n          <div class=\"sub\">Соцмережі вимкнути на 48 годин. Фотографувати можна. Публікувати — ні.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"num\">iii.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"prep\" data-check=\"\">\n        <div class=\"box\"><svg viewBox=\"0 0 12 12\"><path d=\"M2 6 L5 9 L10 3\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div>\n          <div class=\"lbl\">Візьміть мінімум обладнання — навмисно<\u002Fdiv>\n          <div class=\"sub\">По одному інструменту. По одному ноутбуку. Обмеження примушує до зосередженості.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"num\">iv.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"prep\" data-check=\"\">\n        <div class=\"box\"><svg viewBox=\"0 0 12 12\"><path d=\"M2 6 L5 9 L10 3\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div>\n          <div class=\"lbl\">Напишіть 3 чесні речення про стан проєкту<\u002Fdiv>\n          <div class=\"sub\">Без лоску. Без прикрас. Де ви насправді зараз? Поділіться до Розтину.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"num\">v.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"prep\" data-check=\"\">\n        <div class=\"box\"><svg viewBox=\"0 0 12 12\"><path d=\"M2 6 L5 9 L10 3\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div>\n          <div class=\"lbl\">Призначте «хранителя»<\u002Fdiv>\n          <div class=\"sub\">Одна людина фіксує ключові моменти, цитати, ескізи. Не секретар — свідок.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"num\">vi.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"prep\" data-check=\"\">\n        <div class=\"box\"><svg viewBox=\"0 0 12 12\"><path d=\"M2 6 L5 9 L10 3\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div>\n          <div class=\"lbl\">Нормальна їжа, підготована заздалегідь<\u002Fdiv>\n          <div class=\"sub\">Не кейтеринг. Хтось купує і готує. Це важливо для енергії.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"num\">vii.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"prep\" data-check=\"\">\n        <div class=\"box\"><svg viewBox=\"0 0 12 12\"><path d=\"M2 6 L5 9 L10 3\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div>\n          <div class=\"lbl\">Призначте дату 30-денної зустрічі зараз<\u002Fdiv>\n          <div class=\"sub\">Кожен звітує про свій намір. Заплануйте ще до від'їзду.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"num\">viii.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── COMMIT FOOTER ───────────────────────────────────────────────────── -->\n<section class=\"commit\" data-screen-label=\"07 Commit\">\n  <div class=\"commit-glow\"><\u002Fdiv>\n  <div class=\"commit-inner\">\n    <div class=\"overline gold reveal\" style=\"justify-content:center;display:inline-flex;\">§ V · Commitment ritual<\u002Fdiv>\n    <h2 class=\"reveal d1\" style=\"margin-top:24px;\">In <em>тридцять<\u002Fem> днів,<br>я створю <span class=\"gold\">…<\u002Fspan><\u002Fh2>\n    <p class=\"commit-sub reveal d2\">Конкретний результат, а не розмитий намір. Напишіть. Надішліть. Група побачить це на тридцятий день.<\u002Fp>\n\n    <form class=\"commit-fields reveal d3\" onsubmit=\"event.preventDefault(); this.querySelector('.commit-btn').textContent='Підтверджено ✓';\">\n      <input type=\"text\" placeholder=\"напр. одна завершена пісня, три чорнові ескізи…\">\n      <button class=\"commit-btn\" type=\"submit\">Підтвердити<\u002Fbutton>\n    <\u002Fform>\n\n    <div class=\"commit-meta\">\n      <span>© MMXXVI · Resonance protocol<\u002Fspan>\n      <span class=\"gold\">Vox redit ad corpus.<\u002Fspan>\n      <span>Аркуш · 005 / 005<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── three.js + scene ────────────────────────────────────────────────── -->\n<script src=\"a1c68db5-21e6-4c46-93a0-54a751cebf65\"><\u002Fscript>\n<script src=\"fa07db14-371b-462f-8553-2dd14964b088\"><\u002Fscript>\n\n<script>\n// ── Custom cursor ────────────────────────────────────────────────────────\n(function () {\n  const dot = document.getElementById('cur-dot');\n  const ring = document.getElementById('cur-ring');\n  let x = innerWidth / 2, y = innerHeight / 2;\n  let rx = x, ry = y;\n  window.addEventListener('mousemove', (e) => {\n    x = e.clientX; y = e.clientY;\n    dot.style.transform = `translate(${x}px, ${y}px) translate(-50%,-50%)`;\n  }, { passive: true });\n  function loop() {\n    rx += (x - rx) * 0.18;\n    ry += (y - ry) * 0.18;\n    ring.style.transform = `translate(${rx}px, ${ry}px) translate(-50%,-50%)`;\n    requestAnimationFrame(loop);\n  }\n  loop();\n  document.querySelectorAll('a, button, .tile, .tline-card, .mini, .prep, input, .pcard.front').forEach(el => {\n    el.addEventListener('mouseenter', () => ring.classList.add('hover'));\n    el.addEventListener('mouseleave', () => ring.classList.remove('hover'));\n  });\n})();\n\n// ── Scroll progress beam ─────────────────────────────────────────────────\n(function () {\n  const beam = document.getElementById('beam');\n  function update() {\n    const max = document.documentElement.scrollHeight - innerHeight;\n    const p = max > 0 ? scrollY / max : 0;\n    beam.style.height = (p * 100).toFixed(2) + '%';\n  }\n  window.addEventListener('scroll', update, { passive: true });\n  update();\n})();\n\n// ── Reveal on scroll ─────────────────────────────────────────────────────\n(function () {\n  const els = document.querySelectorAll('.reveal');\n  const io = new IntersectionObserver((entries) => {\n    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });\n  }, { threshold: 0.12 });\n  els.forEach(el => io.observe(el));\n})();\n\n// ── Tilt cards (3D mouse) ────────────────────────────────────────────────\n(function () {\n  const tiles = document.querySelectorAll('[data-tilt]');\n  tiles.forEach(tile => {\n    tile.addEventListener('mousemove', (e) => {\n      const r = tile.getBoundingClientRect();\n      const mx = (e.clientX - r.left) / r.width;\n      const my = (e.clientY - r.top) / r.height;\n      const rx = (my - 0.5) * -10;\n      const ry = (mx - 0.5) * 12;\n      tile.style.transform = `perspective(1200px) rotateX(${rx}deg) rotateY(${ry}deg) translateZ(0)`;\n      tile.style.setProperty('--mx', (mx * 100) + '%');\n      tile.style.setProperty('--my', (my * 100) + '%');\n    });\n    tile.addEventListener('mouseleave', () => {\n      tile.style.transform = 'perspective(1200px) rotateX(0) rotateY(0)';\n    });\n  });\n\n  // subtle tilt for timeline cards too\n  const tcards = document.querySelectorAll('.tline-card');\n  tcards.forEach(card => {\n    card.addEventListener('mousemove', (e) => {\n      const r = card.getBoundingClientRect();\n      const mx = (e.clientX - r.left) / r.width;\n      const my = (e.clientY - r.top) / r.height;\n      const ry = (mx - 0.5) * 4;\n      const rx = (my - 0.5) * -3;\n      card.style.transform = `perspective(1400px) rotateX(${rx}deg) rotateY(${ry}deg)`;\n    });\n    card.addEventListener('mouseleave', () => {\n      card.style.transform = 'perspective(1400px) rotateX(0) rotateY(0)';\n    });\n  });\n})();\n\n// ── Day tabs ─────────────────────────────────────────────────────────────\n(function () {\n  document.querySelectorAll('.daytab').forEach(btn => {\n    btn.addEventListener('click', () => {\n      document.querySelectorAll('.daytab').forEach(b => b.classList.remove('active'));\n      document.querySelectorAll('.daypanel').forEach(p => p.classList.remove('active'));\n      btn.classList.add('active');\n      document.getElementById(btn.dataset.day).classList.add('active');\n    });\n  });\n})();\n\n// ── Prompts engine ───────────────────────────────────────────────────────\n(function () {\n  const prompts = [\n    \"Який звук ви асоціюєте з моментом, коли щось от-от зламається?\",\n    \"Опишіть емоційне ядро цього проєкту як погодну подію.\",\n    \"Як звучала б ця музика, якби її зробило ваше майбутнє «я», озираючись назад?\",\n    \"Назвіть одне творче рішення, якого ви боялися прийняти. Чому?\",\n    \"Якби цей проєкт був кімнатою — чим би він пах?\",\n    \"Що ви вдаєте, що не знаєте про цей проєкт?\",\n    \"Який звук ви завжди хотіли використати, але думали, що він вам не підходить?\",\n    \"Завершіть: те, що ми постійно майже говоримо, це…\",\n    \"Що б ви створили, якби ніхто знайомий ніколи не почув?\",\n    \"Яка частина вашого процесу відчувається як обман? Саме її варто досліджувати.\",\n    \"Назвіть пісню, яку любите, але соромитеся визнати, що вона надихнула вас. Що каже цей дискомфорт?\",\n    \"Що має бути правдою, щоб цей проєкт відчувався справді ризикованим?\",\n    \"Якщо прибрати один елемент, який ви вважаєте незамінним — що відкривається?\",\n    \"Чого цей проєкт хоче, а ви ще не дали?\",\n    \"Опишіть тишу між нотами вашого ідеального треку.\",\n  ];\n  const ROMAN = ['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII','XIII','XIV','XV'];\n  let idx = 0;\n\n  const text = document.getElementById('pcard-text');\n  const front = document.getElementById('pcard-front');\n  function render() {\n    const i = ((idx % prompts.length) + prompts.length) % prompts.length;\n    front.style.transform = 'translate3d(0,0,0) rotateY(180deg) rotateX(2deg)';\n    front.style.opacity = 0;\n    setTimeout(() => {\n      text.textContent = prompts[i];\n      front.querySelector('.pcard-overline').textContent = 'Картка · ' + ROMAN[i] + ' / XV';\n      front.querySelectorAll('.pcard-num')[0].textContent = 'N° ' + ROMAN[i];\n      front.style.transform = 'translate3d(0,0,0) rotateY(0) rotateX(2deg)';\n      front.style.opacity = 1;\n    }, 350);\n  }\n  document.getElementById('pbtn-next').addEventListener('click', () => { idx++; render(); });\n  document.getElementById('pbtn-prev').addEventListener('click', () => { idx--; render(); });\n  document.getElementById('pbtn-shuffle').addEventListener('click', () => {\n    idx = Math.floor(Math.random() * prompts.length); render();\n  });\n\n  // mini grid — show 6 distinct prompts\n  const mini = document.getElementById('mini-row');\n  const miniIdx = [1, 4, 6, 9, 11, 14];\n  miniIdx.forEach((mi, j) => {\n    const div = document.createElement('div');\n    div.className = 'mini';\n    div.innerHTML = `<span class=\"idx\">${ROMAN[mi]}<\u002Fspan>“${prompts[mi]}”`;\n    div.addEventListener('click', () => { idx = mi; render(); document.getElementById('prompt-stage').scrollIntoView({ behavior:'smooth', block:'center' }); });\n    mini.appendChild(div);\n  });\n})();\n\n// ── Checklist ────────────────────────────────────────────────────────────\n(function () {\n  document.querySelectorAll('[data-check]').forEach(el => {\n    el.addEventListener('click', () => el.classList.toggle('done'));\n  });\n})();\n\n// ── Nav active state on scroll ───────────────────────────────────────────\n(function () {\n  const links = document.querySelectorAll('#topnav a');\n  const map = { concept:'#concept', day1:'#day1', day2:'#day2', prompts:'#prompts', prep:'#prep' };\n  const io = new IntersectionObserver((entries) => {\n    entries.forEach(e => {\n      if (e.isIntersecting) {\n        const id = '#' + e.target.id;\n        links.forEach(a => a.classList.toggle('active', a.getAttribute('href') === id));\n      }\n    });\n  }, { rootMargin:'-40% 0px -55% 0px' });\n  ['concept','day1','prompts','prep'].forEach(id => {\n    const el = document.getElementById(id);\n    if (el) io.observe(el);\n  });\n  // day1 nav handles day2 too\n  document.querySelector('a[href=\"#day2\"]').addEventListener('click', (e) => {\n    e.preventDefault();\n    document.querySelector('.daytab[data-day=\"d2\"]').click();\n    document.getElementById('day1').scrollIntoView({ behavior:'smooth' });\n  });\n  document.querySelector('a[href=\"#day1\"]').addEventListener('click', (e) => {\n    e.preventDefault();\n    document.querySelector('.daytab[data-day=\"d1\"]').click();\n    document.getElementById('day1').scrollIntoView({ behavior:'smooth' });\n  });\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
